<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slevens Drinking Game</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="game-container">
        <!-- Game Setup Section -->
        <div id="setup-screen" class="screen active">
            <h1>Slevens Drinking Game</h1>
            <div class="setup-form">
                <div class="player-inputs">
                    <div class="player-input">
                        <input type="text" placeholder="Player 1 Name" required>
                        <button class="remove-player" style="display: none;">×</button>
                    </div>
                    <div class="player-input">
                        <input type="text" placeholder="Player 2 Name" required>
                        <button class="remove-player" style="display: none;">×</button>
                    </div>
                </div>
                <button id="add-player" class="btn">Add Player</button>
                <button id="start-game" class="btn primary">Start Game</button>
            </div>
        </div>

        <!-- Main Game Section -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="current-player">
                    <span>Current Player:</span>
                    <span id="player-name">Player 1</span>
                </div>
                <div class="game-status">
                    <span id="game-phase">Shake Phase</span>
                    <div id="timer" class="hidden">5</div>
                </div>
            </div>

            <div class="game-table">
                <div class="dice-cup">
                    <div class="dice-container">
                        <div class="dice" id="dice1">
                            <div class="face front">1</div>
                            <div class="face back">6</div>
                            <div class="face right">2</div>
                            <div class="face left">5</div>
                            <div class="face top">3</div>
                            <div class="face bottom">4</div>
                        </div>
                        <div class="dice" id="dice2">
                            <div class="face front">1</div>
                            <div class="face back">6</div>
                            <div class="face right">2</div>
                            <div class="face left">5</div>
                            <div class="face top">3</div>
                            <div class="face bottom">4</div>
                        </div>
                    </div>
                </div>
                <div class="table-surface"></div>
            </div>

            <div class="player-list">
                <h3>Players</h3>
                <div id="players-container"></div>
            </div>

            <div class="game-controls">
                <button id="roll-dice" class="btn primary">Roll Dice</button>
                <div class="aim-interface hidden">
                    <div class="trajectory-preview"></div>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <h2>Game Results</h2>
            <div id="results-container"></div>
            <button id="new-game" class="btn primary">New Game</button>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="dice-rattle" src="sounds/rattle.mp3" preload="auto"></audio>
    <audio id="dice-roll" src="sounds/roll.mp3" preload="auto"></audio>
    <audio id="dice-land" src="sounds/land.mp3" preload="auto"></audio>

    <!-- Scripts -->
    <script src="js/dice-physics.js"></script>
    <script src="js/shake-detection.js"></script>
    <script src="js/player-management.js"></script>
    <script src="js/game.js"></script>
    <script src="js/test.js"></script>
</body>
</html>
